            credit card. All invoices fully paid. Date range 2024-03-16 to
            2026-04-22.

    # ── NarrativeEvent ───────────────────────────────────────────────────
    - name: NarrativeEvent
      description: >-
        Business events that affect operations but are not captured in
        transactional data. Includes line-of-credit draws, overtime mandates,
        and pricing changes. Modeled as a single flexible type with
        event_type discriminator. See decision D_1002.
      identifier:
        property: event_id
        pattern: "EVT-NNN sequential (EVT-003, EVT-014, EVT-018)"
      properties:
        - name: event_id
          type: string
          required: true
          source: direct
          description: Unique event identifier
          computation_spec: null
        - name: event_type
          type: string
          required: true
          source: inferred
          description: Type of narrative event (loc_draw, overtime_mandate, pricing_change). Inferred from source file.
          computation_spec: "Derived from source filename (loc_event, overtime_event, pricing_change)"
        - name: date
          type: date
          required: true
          source: direct
          description: Event date or effective date (mapped from date, start_date, or effective_date depending on source)
          computation_spec: null
        - name: description
          type: string
          required: true
          source: direct
          description: Human-readable description of the event
          computation_spec: null
        - name: amount
          type: float
          required: false
          source: direct
          description: Monetary amount associated with the event (loc_draw only)
          computation_spec: null
        - name: event_metadata
          type: string
          required: false
          source: inferred
          description: JSON-encoded event-specific fields that vary by event_type
          computation_spec: "Aggregated from type-specific columns (duration_weeks, affected_employees, old_bill_rate, new_bill_rate, etc.)"
      lifecycle:
        states: []
        state_field: null
      sources:
        - loc_event
        - overtime_event
        - pricing_change
      instance_count: 3
      simulation_mapping:
        maps_to: null
        mapping_notes: >-
          No Simulation equivalent. Narrative events are scenario-modeling
          inputs for simulation. They represent exogenous shocks or policy
          changes. Simulation extension may define a Scenario or Event node.
      evidence:
        - source: loc_event.csv
          location: "row 1"
          observation: >-
            EVT-003: $22,000 LOC draw on 2024-04-11 to cover payroll during
            Johnson payment delay.
        - source: overtime_event.csv
          location: "row 1"
          observation: >-
            EVT-018: 6-week overtime mandate starting 2025-07-21, 8 OT
            hours/week/person for EMP-002, EMP-004, EMP-005, EMP-006.
            Crew overtime to cover Vega (EMP-003) departure gap.
        - source: pricing_change.csv
          location: "row 1"
          observation: >-
            EVT-014: Repair service bill rate increase from $85 to $110
            effective 2025-04-01. Burden + overhead was not covered at $85.

