        - name: budgeted_equipment_cost
          type: float
          required: true
          source: direct
          description: Budgeted equipment cost (always 0.0 in current data)
          computation_spec: null
        - name: budgeted_other_cost
          type: float
          required: true
          source: direct
          description: Budgeted other cost (always 0.0 in current data)
          computation_spec: null
        - name: status
          type: string
          required: true
          source: direct
          description: Job status (all complete in historical data)
          computation_spec: null
        - name: sort_order
          type: integer
          required: true
          source: direct
          description: Display sort order within the project
          computation_spec: null
        - name: sub_vendor_type
          type: string
          required: false
          source: direct
          description: Trade specialty for subcontractor jobs (plumbing, electrical, hvac, tile, countertops). 77% null.
          computation_spec: null
        - name: equipment_needed
