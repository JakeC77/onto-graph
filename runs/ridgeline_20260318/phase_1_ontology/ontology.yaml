        - source: bill_line_item.csv
          location: "all 745 rows, bill_id column"
          observation: >-
            745 line items with 1:1 bill_id mapping. Carries project_id and
            job_id for cost allocation. Note: vendor_id is on the bill header,
            not on the line item directly. See D_1003 for entity separation
