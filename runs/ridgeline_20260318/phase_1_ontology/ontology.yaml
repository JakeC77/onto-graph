          description: FK to the originating Estimate
          computation_spec: null
        - name: customer_id
          type: string
          required: true
          source: direct
          description: FK to Customer entity
          computation_spec: null
        - name: name
          type: string
          required: true
          source: direct
          description: Project name (typically CustomerLastName — ArchetypeDescription)
          computation_spec: null
        - name: archetype
          type: string
          required: true
          source: direct
          description: Project archetype (7 types matching estimate archetypes)
          computation_spec: null
        - name: type
          type: string
          required: true
          source: direct
