          computation_spec: null
      lifecycle:
        states: []
        state_field: null
      sources:
        - vendor
      instance_count: 10
      simulation_mapping:
        maps_to: null
        mapping_notes: >-
          No direct Simulation node type for Vendor. Subcontractors could map
          to Person if individual, but vendors are businesses. Recommend
          Simulation extension for Vendor/Counterparty node type.
      evidence:
        - source: vendor.csv
          location: "all 10 rows, type column"
          observation: >-
            10 vendors with 4 distinct types: supplier (4), subcontractor (4),
            equipment_rental (1), professional_service (1). VEN-010 is synthetic
            Overhead & Recurring vendor. Same schema for all vendor types
            supports single entity type decision (D_1001).

    # ── Employee ─────────────────────────────────────────────────────────
    - name: Employee
      description: >-
        W-2 employees of Ridgeline Builders. Includes the owner, field crew
        (foreman, journeymen), and potentially office staff. The data shows
        5 employees with a reference to EMP-006 in narrative events.
      identifier:
        property: id
        pattern: "EMP-NNN sequential (EMP-001 through EMP-005)"
      properties:
        - name: id
          type: string
          required: true
          source: direct
          description: Unique employee identifier
          computation_spec: null
        - name: name
          type: string
          required: true
          source: direct
          description: Employee full name
          computation_spec: null
        - name: role
          type: string
          required: true
          source: direct
          description: Job role (owner, foreman, journeyman)
          computation_spec: null
        - name: trade
          type: string
          required: true
          source: direct
          description: Trade classification (all general in current data)
          computation_spec: null
        - name: base_rate
          type: float
          required: true
          source: direct
          description: Hourly base pay rate. Owner has 0.0 (does not draw hourly wage).
          computation_spec: null
        - name: burden_rate
          type: float
          required: true
          source: direct
          description: Fully burdened hourly cost (base + taxes, insurance, benefits)
          computation_spec: null
        - name: bill_rate
