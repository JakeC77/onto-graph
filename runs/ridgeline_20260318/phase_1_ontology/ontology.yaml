          computation_spec: null
        - name: status
          type: string
          required: true
          source: direct
          description: Project status (all complete in historical data)
          computation_spec: null
        - name: site_address
          type: string
          required: true
          source: direct
          description: Physical address of the construction site
          computation_spec: null
        - name: start_date
          type: date
          required: true
          source: direct
          description: Planned start date
          computation_spec: null
        - name: end_date
          type: date
          required: true
          source: direct
          description: Planned end date
          computation_spec: null
        - name: actual_start
          type: date
          required: true
          source: direct
          description: Actual start date
          computation_spec: null
        - name: actual_end
          type: date
          required: true
          source: direct
          description: Actual end date
          computation_spec: null
        - name: contract_amount
          type: float
          required: true
