          source: direct
          description: Building permit number. 70.6% null (not all projects need permits).
          computation_spec: null
      lifecycle:
        states:
          - complete
        state_field: status
      sources:
        - project
      instance_count: 51
      simulation_mapping:
        maps_to: Initiative
        mapping_notes: >-
          Maps to Simulation Initiative node. Project name, dates, and status
          translate directly. Contract financials and construction-specific
          fields (permit, retention, archetype) are domain extensions.
      evidence:
        - source: project.csv
          location: "all 51 rows, project_id and estimate_id columns"
          observation: >-
