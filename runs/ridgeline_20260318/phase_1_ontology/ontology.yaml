    # ── Invoice ──────────────────────────────────────────────────────────
    - name: Invoice
      description: >-
        Customer-facing invoices issued by Ridgeline Builders for project
        work. Supports progress billing, final invoices, and retention
        release invoices.
      identifier:
        property: invoice_id
        pattern: "INV-XXXXXXXX UUID (e.g., INV-04F11446) with sequential INV-NNNN number"
      properties:
        - name: invoice_id
          type: string
          required: true
          source: direct
          description: Unique invoice identifier (UUID-based)
          computation_spec: null
        - name: invoice_number
          type: string
          required: true
          source: direct
          description: Sequential human-readable invoice number (INV-0001)
          computation_spec: null
        - name: project_id
          type: string
          required: true
          source: direct
          description: FK to Project entity
          computation_spec: null
        - name: customer_id
          type: string
          required: true
          source: direct
          description: FK to Customer entity
          computation_spec: null
        - name: type
          type: string
          required: true
          source: direct
          description: Invoice type (progress, final, retention)
          computation_spec: null
        - name: status
          type: string
          required: true
          source: direct
          description: Invoice status (all paid in historical data)
          computation_spec: null
        - name: issued_date
          type: date
          required: true
          source: direct
          description: Date the invoice was issued
          computation_spec: null
        - name: due_date
          type: date
          required: true
          source: direct
          description: Payment due date
          computation_spec: null
        - name: subtotal
          type: float
          required: true
          source: direct
          description: Invoice subtotal before retention and tax
          computation_spec: null
        - name: retention_held
          type: float
          required: true
          source: direct
          description: Amount of retention withheld from this invoice
          computation_spec: null
        - name: tax
          type: float
          required: true
          source: direct
          description: Tax amount (0.0 in all current data)
          computation_spec: null
        - name: total_due
          type: float
          required: true
          source: direct
          description: Net amount due (subtotal - retention_held + tax)
          computation_spec: null
      lifecycle:
        states:
          - paid
        state_field: status
      sources:
        - invoice
      instance_count: 134
      simulation_mapping:
        maps_to: CustomerContract
        mapping_notes: >-
          Partial match to Simulation CustomerContract. Invoices are
          transactional artifacts within a project, not the contract itself.
          The Project entity is a closer match to CustomerContract. Invoices
