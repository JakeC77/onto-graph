          computation_spec: null
        - name: status
          type: string
          required: true
          source: direct
          description: Employment status (active, terminated)
          computation_spec: null
        - name: hire_date
          type: date
          required: true
          source: direct
          description: Date of hire
          computation_spec: null
        - name: termination_date
          type: date
          required: false
          source: direct
          description: Date of termination. 80% null (only terminated employees).
          computation_spec: null
      lifecycle:
        states:
          - active
          - terminated
        state_field: status
      sources:
        - employee
      instance_count: 5
      simulation_mapping:
        maps_to: Person
        mapping_notes: >-
          Direct match to Simulation Person node. Employee name, role,
          and status map naturally. Rate properties are domain-specific
          extensions. Missing reports_to relationship (flat org structure).
      evidence:
        - source: employee.csv
          location: "all 5 rows, role and status columns"
          observation: >-
            5 employees: 1 owner (EMP-001, base_rate=0), 1 foreman (EMP-002),
            3 journeymen (EMP-003 through EMP-005). EMP-003 terminated
            2025-07-18. Overtime event references EMP-006 not in file.

    # ── Estimate ─────────────────────────────────────────────────────────
    - name: Estimate
      description: >-
        Proposals sent to customers for construction work. Each estimate has
        a project archetype, line items, and a won/lost lifecycle. Accepted
        estimates convert into Projects.
      identifier:
        property: estimate_id
        pattern: "EST-XXXXXXXX UUID (e.g., EST-4F32A47F) with sequential EST-NNNN number"
      properties:
        - name: estimate_id
          type: string
          required: true
          source: direct
          description: Unique estimate identifier (UUID-based)
          computation_spec: null
        - name: estimate_number
          type: string
          required: true
          source: direct
          description: Sequential human-readable estimate number (EST-0001)
          computation_spec: null
        - name: version
          type: integer
          required: true
          source: direct
          description: Estimate version (all version 1 in current data)
          computation_spec: null
        - name: customer_id
          type: string
          required: true
          source: direct
          description: FK to Customer entity
          computation_spec: null
        - name: archetype
          type: string
          required: true
          source: direct
          description: Project archetype classification (7 types)
          computation_spec: null
        - name: status
          type: string
          required: true
          source: direct
          description: Estimate lifecycle status (accepted, expired, declined, sent)
          computation_spec: null
        - name: scope_description
          type: string
          required: true
          source: direct
          description: Description of work scope
          computation_spec: null
        - name: exclusions
          type: string
          required: true
          source: direct
          description: Work excluded from the estimate
          computation_spec: null
        - name: assumptions
          type: string
          required: true
          source: direct
          description: Assumptions underlying the estimate
          computation_spec: null
        - name: total
          type: float
          required: true
          source: direct
          description: Total estimate price to customer
          computation_spec: null
        - name: cost_estimate
          type: float
          required: true
          source: direct
          description: Estimated cost to Ridgeline (before markup)
          computation_spec: null
        - name: markup_pct
          type: float
          required: true
          source: direct
          description: Markup percentage over estimated cost
          computation_spec: null
        - name: tax_amount
          type: float
          required: true
          source: direct
          description: Tax amount (0.0 in all current data)
          computation_spec: null
        - name: created_at
          type: date
          required: true
          source: direct
          description: Date the estimate was created
          computation_spec: null
        - name: sent_at
          type: date
          required: true
          source: direct
          description: Date the estimate was sent to the customer
          computation_spec: null
        - name: valid_until
          type: date
          required: true
          source: direct
          description: Expiration date of the estimate
          computation_spec: null
        - name: accepted_at
          type: date
          required: false
          source: direct
          description: Date the estimate was accepted. 49% null (non-accepted estimates).
          computation_spec: null
        - name: project_id
          type: string
          required: false
          source: direct
          description: FK to Project entity. 49% null (only accepted estimates have projects).
          computation_spec: null
      lifecycle:
        states:
          - sent
          - accepted
          - declined
          - expired
        state_field: status
      sources:
        - estimate
      instance_count: 100
      simulation_mapping:
        maps_to: null
        mapping_notes: >-
          No direct Simulation type for Estimate. Could map to a pre-Initiative
          proposal concept if Simulation is extended. The estimate-to-project
          conversion is a key business lifecycle transition.
      evidence:
        - source: estimate.csv
          location: "all 100 rows, status and project_id columns"
          observation: >-
            100 estimates: 51 accepted (with project_id), 49 not converted
            (expired, declined, or still sent). 7 archetypes. customer_id FK
            links to all 13 customers. Date range 2024-01-02 to 2026-01-24.

    # ── EstimateLineItem ─────────────────────────────────────────────────
    - name: EstimateLineItem
      description: >-
        Individual cost-code-level line items within an estimate. Each line
        represents a specific scope of work (demolition, framing, electrical,
        etc.) with estimated cost and price.
      identifier:
        property: line_id
        pattern: "ELI-XXXXXXXX UUID (e.g., ELI-74BF9B68)"
      properties:
        - name: line_id
          type: string
          required: true
          source: direct
          description: Unique line item identifier
          computation_spec: null
        - name: estimate_id
          type: string
          required: true
          source: direct
          description: FK to parent Estimate entity
          computation_spec: null
        - name: cost_code
          type: string
          required: true
          source: direct
          description: Cost code identifier (e.g., 01-LABOR, 03-FRAMING). Links to Job.code.
          computation_spec: null
        - name: description
          type: string
          required: true
          source: direct
          description: Human-readable description of the line item
          computation_spec: null
        - name: quantity
          type: integer
          required: true
          source: direct
          description: Quantity (always 1 in current data — lump sum)
          computation_spec: null
        - name: unit
          type: string
          required: true
          source: direct
          description: Unit of measure (always ls/lump sum in current data)
          computation_spec: null
        - name: unit_cost
          type: float
          required: true
          source: direct
          description: Estimated cost per unit to Ridgeline
          computation_spec: null
        - name: unit_price
          type: float
          required: true
          source: direct
          description: Price per unit charged to customer
          computation_spec: null
        - name: line_total
          type: float
          required: true
          source: direct
          description: Total line item price (quantity * unit_price)
          computation_spec: null
        - name: category
          type: string
          required: true
          source: direct
          description: Cost category (labor, material, subcontractor)
          computation_spec: null
      lifecycle:
        states: []
        state_field: null
      sources:
        - estimate_line_item
      instance_count: 1173
      simulation_mapping:
        maps_to: null
        mapping_notes: >-
          No Simulation equivalent. Detail-level data supporting estimate
          pricing and budget-to-actual tracking through cost_code linkage
          to Job entities.
      evidence:
        - source: estimate_line_item.csv
          location: "all 1173 rows, cost_code column"
          observation: >-
            1173 line items across 100 estimates (~11.7 per estimate). 56
            distinct cost codes. cost_code values match job.code with 100%
            overlap, enabling budget-to-actual comparison. All lump-sum
            pricing (quantity=1, unit=ls).

