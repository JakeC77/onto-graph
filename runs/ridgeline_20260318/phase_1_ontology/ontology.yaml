        entity preserves the project/job-level cost allocation granularity.
        See decision D_1003.
      identifier:
        property: line_id
        pattern: "BLI-XXXXXXXX UUID (e.g., BLI-8F3D1502)"
      properties:
        - name: line_id
          type: string
          required: true
          source: direct
          description: Unique line item identifier
          computation_spec: null
        - name: bill_id
          type: string
          required: true
          source: direct
          description: FK to parent Bill entity
          computation_spec: null
        - name: project_id
          type: string
          required: false
          source: direct
          description: FK to Project entity. 22.8% null for overhead bills.
          computation_spec: null
        - name: job_id
          type: string
          required: false
          source: direct
          description: FK to Job entity. 22.8% null for overhead bills.
          computation_spec: null
        - name: description
          type: string
          required: true
          source: direct
          description: Description of the billed item or service
          computation_spec: null
        - name: quantity
          type: integer
          required: true
          source: direct
          description: Quantity (always 1 in current data — lump sum)
          computation_spec: null
        - name: unit_cost
          type: float
          required: true
          source: direct
          description: Cost per unit
          computation_spec: null
        - name: line_total
          type: float
          required: true
          source: direct
          description: Total line item amount (quantity * unit_cost)
          computation_spec: null
        - name: category
          type: string
          required: true
          source: direct
          description: Spend category matching bill header
          computation_spec: null
      lifecycle:
        states: []
        state_field: null
      sources:
        - bill_line_item
      instance_count: 745
      simulation_mapping:
        maps_to: null
        mapping_notes: >-
          No Simulation equivalent. Detail-level cost allocation data
