          source: direct
          description: Unique vendor identifier
          computation_spec: null
        - name: name
          type: string
          required: true
          source: direct
          description: Vendor business name
          computation_spec: null
        - name: type
          type: string
          required: true
          source: direct
          description: Vendor role classification (supplier, subcontractor, equipment_rental, professional_service)
          computation_spec: null
        - name: trade
          type: string
          required: false
          source: direct
          description: Trade specialty (general, electrical, plumbing, hvac, tile, countertops). 20% null.
          computation_spec: null
        - name: contact
          type: string
          required: false
          source: direct
          description: Primary contact person name. 10% null.
          computation_spec: null
        - name: phone
          type: string
          required: false
          source: direct
          description: Vendor phone number. 10% null.
          computation_spec: null
        - name: email
          type: string
          required: false
          source: direct
          description: Vendor email address. 10% null.
          computation_spec: null
        - name: payment_terms
          type: string
          required: true
          source: direct
          description: Payment terms (net_30, net_15, due_on_receipt)
          computation_spec: null
        - name: tax_id
          type: string
          required: false
          source: direct
          description: Federal tax ID (EIN). 10% null.
          computation_spec: null
        - name: w9_on_file
          type: boolean
          required: true
          source: direct
          description: Whether a W-9 form is on file
          computation_spec: null
        - name: insurance_expiry
          type: date
          required: false
          source: direct
          description: Insurance certificate expiration date. 50% null (suppliers without insurance tracking).
          computation_spec: null
        - name: rating
          type: float
          required: false
          source: direct
          description: Vendor quality rating (3.0-5.0 scale). 10% null.
          computation_spec: null
        - name: credit_limit
          type: float
          required: false
          source: direct
          description: Vendor credit limit. 90% null.
          computation_spec: null
        - name: account_opened
