  # ════════════════════════════════════════════════════════════════════════
  # Entity Types
  # ════════════════════════════════════════════════════════════════════════
  entity_types:

    # ── Company ──────────────────────────────────────────────────────────
    - name: Company
      description: >-
        The general contracting firm itself. Singleton record representing
        Ridgeline Builders, a small residential and light commercial general
        contractor in central Pennsylvania.
      identifier:
        property: name
        pattern: "Single record — identified by company name"
      properties:
        - name: name
          type: string
          required: true
          source: direct
          description: Legal business name
          computation_spec: null
        - name: trade
          type: string
          required: true
          source: direct
          description: Primary trade classification
          computation_spec: null
        - name: region
          type: string
          required: true
          source: direct
          description: Geographic operating region
          computation_spec: null
        - name: owner_name
          type: string
          required: true
          source: direct
          description: Name of the company owner
          computation_spec: null
        - name: owner_employee_id
          type: string
          required: true
          source: direct
          description: FK to Employee entity for the owner
          computation_spec: null
        - name: address
          type: string
          required: true
          source: direct
          description: Business mailing address
          computation_spec: null
        - name: phone
          type: string
          required: true
          source: direct
          description: Business phone number
          computation_spec: null
        - name: email
          type: string
          required: true
          source: direct
          description: Business email address
          computation_spec: null
        - name: license_number
          type: string
          required: true
          source: direct
          description: State home improvement contractor license number
          computation_spec: null
      lifecycle:
        states: []
        state_field: null
      sources:
        - company
      instance_count: 1
      simulation_mapping:
        maps_to: null
        mapping_notes: >-
          No direct Simulation node type for the company entity itself.
          Company metadata may be stored as graph-level properties or a
          singleton Organization node if Simulation is extended.
      evidence:
        - source: company.csv
          location: "row 1, all columns"
          observation: >-
            Single-row file with company name, trade, region, owner info,
            address, phone, email, and license number. owner_employee_id
            links to EMP-001 in employee.csv.

    # ── Customer ─────────────────────────────────────────────────────────
    - name: Customer
      description: >-
        Property owners or businesses that commission construction work from
        Ridgeline Builders. Mix of residential homeowners and commercial
        tenants in central Pennsylvania.
      identifier:
        property: id
        pattern: "CUST-NNN sequential (CUST-001 through CUST-013)"
      properties:
        - name: id
          type: string
          required: true
          source: direct
          description: Unique customer identifier
          computation_spec: null
        - name: name
          type: string
          required: true
          source: direct
          description: Customer name (individual or couple)
          computation_spec: null
        - name: email
          type: string
          required: true
          source: direct
          description: Customer email address
          computation_spec: null
        - name: phone
          type: string
          required: true
          source: direct
          description: Customer phone number
          computation_spec: null
        - name: address
          type: string
          required: true
          source: direct
          description: Customer property or mailing address
          computation_spec: null
        - name: payment_terms
          type: string
          required: true
          source: direct
          description: Negotiated payment terms (net_15, net_30, net_45, due_on_receipt)
          computation_spec: null
        - name: source
          type: string
          required: true
          source: direct
          description: How the customer was acquired (referral, repeat, google, yard_sign, direct_outreach)
          computation_spec: null
        - name: type
          type: string
          required: true
          source: direct
          description: Customer classification — residential or commercial
          computation_spec: null
        - name: tax_exempt
          type: boolean
          required: true
          source: direct
          description: Whether the customer is tax-exempt
          computation_spec: null
        - name: credit_limit
          type: float
          required: true
          source: direct
          description: Customer credit limit (0 for all in current data)
          computation_spec: null
        - name: status
          type: string
          required: true
          source: direct
          description: Customer status (active)
          computation_spec: null
        - name: created_at
          type: date
          required: true
          source: direct
          description: Date the customer record was created
          computation_spec: null
        - name: notes
          type: string
          required: false
          source: direct
          description: Free-text notes about the customer (92.3% null)
          computation_spec: null
      lifecycle:
        states:
          - active
        state_field: status
      sources:
        - customer
      instance_count: 13
      simulation_mapping:
        maps_to: Customer
        mapping_notes: >-
          Direct match to Simulation Customer node. Customer properties map
          naturally. payment_terms and source are domain-specific extensions.
      evidence:
        - source: customer.csv
          location: "all 13 rows"
          observation: >-
            13 distinct customers with CUST-xxx IDs. 2 types (residential,
            commercial). 5 acquisition sources. All created 2024-01-01 (bulk
            import). Referenced by estimate, project, invoice, and payment
            via customer_id FK.

    # ── Vendor ───────────────────────────────────────────────────────────
    - name: Vendor
