          computation_spec: null
        - name: project_id
          type: string
          required: true
          source: direct
          description: FK to parent Project entity
          computation_spec: null
        - name: code
          type: string
          required: true
          source: direct
          description: Cost code (e.g., 01-DEMO, 03-FRAMING). Links to EstimateLineItem.cost_code.
          computation_spec: null
        - name: name
          type: string
          required: true
          source: direct
          description: Human-readable name of the cost code
          computation_spec: null
        - name: budgeted_labor_hours
          type: float
          required: true
          source: direct
          description: Budgeted labor hours for this job
          computation_spec: null
        - name: budgeted_labor_cost
          type: float
          required: true
          source: direct
          description: Budgeted labor cost
          computation_spec: null
        - name: budgeted_material_cost
