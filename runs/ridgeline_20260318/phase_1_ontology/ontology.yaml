          location: "cost_code column, all 1173 rows"
          observation: >-
            estimate_line_item.cost_code matches job.code with 100% overlap.
            56 distinct cost codes. This is a semantic join (same cost code
            vocabulary) rather than a direct FK, but the match is exact.
            See decision D_1004.

    # Note: bill_line_item → bill relationship (bill_has_line_item) is
    # modeled implicitly through BillLineItem.bill_id FK. The 1:1
    # cardinality in current data makes this a degenerate parent-child.

  # ════════════════════════════════════════════════════════════════════════
  # Domain Concepts
  # ════════════════════════════════════════════════════════════════════════
  domain_concepts:

    - name: project_archetype
      definition: >-
        A classification of construction projects by the nature and scale
        of work. Archetypes drive estimate templates, cost code selections,
        and expected margin profiles.
      entity_type: Project
      values:
        - repair_service
        - bathroom_remodel
        - kitchen_remodel
        - deck_addition
        - room_addition
        - new_construction
        - tenant_improvement
      source: project.csv archetype column; estimate.csv archetype column
      notes: >-
        7 archetypes appear in both estimate and project data. They represent
        the full range of work Ridgeline undertakes, from small repairs to
        new construction and commercial tenant improvements.

    - name: project_type
      definition: >-
        A higher-level grouping of project archetypes into construction
        work categories. Derived from archetype but at a coarser grain.
      entity_type: Project
      values:
        - repair
        - renovation
        - addition
        - new_construction
        - tenant_improvement
      source: project.csv type column
      notes: >-
        5 types map to 7 archetypes. repair_service maps to repair.
        bathroom_remodel and kitchen_remodel map to renovation. deck_addition
        and room_addition map to addition.

    - name: vendor_type
      definition: >-
        The role a vendor plays in Ridgeline's supply chain. Determines
        the nature of the business relationship and billing patterns.
      entity_type: Vendor
      values:
        - supplier
        - subcontractor
        - equipment_rental
        - professional_service
      source: vendor.csv type column
      notes: >-
        4 vendor types. Suppliers provide materials. Subcontractors perform
        trade-specific work (plumbing, electrical, hvac, tile, countertops).
        Equipment rental provides machinery. Professional services include
        surveying, engineering, etc. See decision D_1001.

    - name: employee_role
      definition: >-
        The job function of an employee within Ridgeline Builders. Determines
        pay rates, bill rates, and crew hierarchy.
      entity_type: Employee
      values:
        - owner
        - foreman
        - journeyman
        - apprentice
        - office_admin
      source: employee.csv role column
      notes: >-
        Current data shows 3 of 5 values (owner, foreman, journeyman).
        Apprentice and office_admin are expected roles based on the
        engagement brief (5-9 employees, small GC) but not present in
        the 5-employee dataset.

    - name: estimate_status
      definition: >-
        The lifecycle state of an estimate, tracking it from creation
        through customer decision.
      entity_type: Estimate
      values:
        - sent
        - accepted
        - declined
        - expired
      source: estimate.csv status column
      notes: >-
        4 statuses. Accepted estimates generate projects. Declined and
        expired are terminal states. Sent estimates may still be pending
        customer decision.

    - name: payment_terms
      definition: >-
        The agreed timeframe for payment between Ridgeline and its
        customers or vendors. Applied at the customer and vendor level.
      entity_type: Customer
      values:
        - net_15
        - net_30
        - net_45
        - due_on_receipt
      source: customer.csv payment_terms column; vendor.csv payment_terms column
      notes: >-
        Same vocabulary used for both customer and vendor payment terms.
        net_30 is most common. Vendor terms are limited to net_30, net_15,
        and due_on_receipt (no net_45).

    - name: customer_type
      definition: >-
        Classification of customers by the type of property or business
        relationship. Affects project scope, permitting, and billing patterns.
      entity_type: Customer
      values:
        - residential
        - commercial
      source: customer.csv type column
      notes: >-
        2 types. Residential customers are homeowners. Commercial customers
        are businesses commissioning tenant improvements or similar work.

    - name: customer_source
      definition: >-
        The acquisition channel through which a customer was obtained.
        Tracks marketing effectiveness and referral network strength.
      entity_type: Customer
      values:
        - referral
        - repeat
        - google
        - yard_sign
        - direct_outreach
      source: customer.csv source column
      notes: >-
        5 acquisition sources. Referral and repeat indicate relationship-driven
        business development. Google and yard_sign are marketing channels.
        Direct outreach suggests proactive sales effort.

    - name: contract_type
      definition: >-
        The pricing structure of the construction contract between Ridgeline
        and the customer.
      entity_type: Project
      values:
        - fixed_price
      source: project.csv contract_type column
      notes: >-
        All 51 projects use fixed_price contracts. No time-and-materials
        or cost-plus contracts in the dataset. This is typical for
        residential general contractors.

    - name: bill_category
      definition: >-
        Classification of vendor bills by the type of expense. Used for
        cost analysis and job costing.
      entity_type: Bill
      values:
        - material
        - subcontractor
        - equipment
        - rent
        - vehicles
        - utilities
        - software
        - insurance
        - tools
      source: bill.csv category column; bill_line_item.csv category column
      notes: >-
        8 categories in the data. material and subcontractor are project-related.
        rent, vehicles, utilities, software, insurance, tools are overhead
        categories appearing on non-project bills (22.8% of bills).

  # ════════════════════════════════════════════════════════════════════════
  # Simulation Compatibility
  # ════════════════════════════════════════════════════════════════════════
  simulation_compatibility:
    matched_node_types:
      - ontology_type: Employee
        simulation_type: Person
      - ontology_type: Customer
        simulation_type: Customer
      - ontology_type: Project
        simulation_type: Initiative

    matched_edge_types: []

    unmapped_ontology_types:
      - Company
      - Vendor
      - Estimate
      - EstimateLineItem
      - Job
      - TimeEntry
      - Bill
      - BillLineItem
      - Invoice
      - Payment
      - NarrativeEvent

    missing_simulation_types:
      - Department
      - System
      - Process
      - Covenant

    extension_recommendations:
      - >-
        Add Vendor/Counterparty node type to Simulation for supplier and
        subcontractor relationships. Construction businesses depend heavily
        on vendor networks.
      - >-
        Add VendorContract or Bill node to capture cost-side transactions.
        Current Simulation contract types may not cover vendor billing.
      - >-
        Add Task or WorkPackage node for Job-level cost tracking within
        Initiatives. Construction projects have natural work breakdown
        structures.
      - >-
        Add reports_to and communicates edges if organizational hierarchy
        or communication data becomes available. Current data has a flat
        crew structure with no explicit reporting lines.
      - >-
        Add Scenario or Event node for NarrativeEvent simulation modeling.
        These events represent exogenous shocks (LOC draws, overtime
        mandates, pricing changes) that affect business outcomes.
