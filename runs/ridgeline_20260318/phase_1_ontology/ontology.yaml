            codes. job.code matches estimate_line_item.cost_code with 100%
            overlap. Links to time_entry and bill for actual cost tracking.

    # ── TimeEntry ────────────────────────────────────────────────────────
    - name: TimeEntry
      description: >-
        Daily time records for crew members working on specific jobs. Tracks
        regular and overtime hours separately with computed labor cost.
      identifier:
        property: entry_id
        pattern: "TE-XXXXXXXX UUID (e.g., TE-65D1FA0D)"
      properties:
        - name: entry_id
          type: string
          required: true
          source: direct
          description: Unique time entry identifier
          computation_spec: null
        - name: employee_id
          type: string
          required: true
          source: direct
          description: FK to Employee entity
          computation_spec: null
        - name: project_id
          type: string
          required: true
          source: direct
          description: FK to Project entity
          computation_spec: null
        - name: job_id
          type: string
          required: true
          source: direct
          description: FK to Job entity
          computation_spec: null
        - name: date
          type: date
          required: true
          source: direct
          description: Date of the time entry
          computation_spec: null
        - name: hours_regular
          type: float
          required: true
          source: direct
          description: Regular hours worked
          computation_spec: null
        - name: hours_overtime
          type: float
          required: true
          source: direct
          description: Overtime hours worked
          computation_spec: null
        - name: cost
          type: float
          required: true
          source: computed
          description: Computed labor cost for this entry
          computation_spec: "hours_regular * burden_rate + hours_overtime * burden_rate * 1.5"
        - name: notes
          type: string
          required: true
          source: direct
          description: Description of work performed
          computation_spec: null
      lifecycle:
        states: []
        state_field: null
      sources:
        - time_entry
      instance_count: 1710
      simulation_mapping:
        maps_to: null
        mapping_notes: >-
          No direct Simulation equivalent. Time entries are operational detail
          supporting labor cost tracking. Could inform Person-Initiative
          participation edges in Simulation.
      evidence:
        - source: time_entry.csv
          location: "all 1710 rows, employee_id column"
          observation: >-
            1710 time entries across 4 employees (EMP-001/owner does not log
            time). Linked to project and job via FK. Date range 2024-02-12
            to 2026-01-02. Tracks regular and OT hours separately.

    # ── Bill ─────────────────────────────────────────────────────────────
    - name: Bill
      description: >-
        Vendor invoices received by Ridgeline Builders. Includes both
        project-related bills (materials, subcontractors) and overhead bills
        (rent, utilities, insurance). All historical bills are paid.
      identifier:
        property: bill_id
        pattern: "BILL-XXXXXXXX UUID (e.g., BILL-B7EBAB84)"
      properties:
        - name: bill_id
          type: string
          required: true
          source: direct
          description: Unique bill identifier
          computation_spec: null
        - name: vendor_id
          type: string
          required: true
          source: direct
          description: FK to Vendor entity
          computation_spec: null
        - name: project_id
          type: string
          required: false
          source: direct
          description: FK to Project entity. 22.8% null for overhead bills.
          computation_spec: null
        - name: job_id
          type: string
          required: false
          source: direct
          description: FK to Job entity. 22.8% null for overhead bills.
          computation_spec: null
        - name: vendor_invoice_number
          type: string
          required: true
          source: direct
          description: Vendor's own invoice number
          computation_spec: null
        - name: status
          type: string
          required: true
          source: direct
          description: Bill payment status (all paid in historical data)
          computation_spec: null
        - name: received_date
          type: date
          required: true
          source: direct
          description: Date the bill was received
          computation_spec: null
        - name: due_date
          type: date
          required: true
          source: direct
          description: Payment due date
          computation_spec: null
        - name: total
          type: float
          required: true
          source: direct
          description: Total bill amount
          computation_spec: null
        - name: paid_date
          type: date
          required: true
          source: direct
          description: Date the bill was paid
          computation_spec: null
        - name: payment_method
          type: string
          required: true
          source: direct
          description: Payment method (check, ach)
          computation_spec: null
        - name: check_number
          type: integer
          required: false
          source: direct
          description: Check number for check payments. 24.2% null (ACH payments).
          computation_spec: null
        - name: category
          type: string
          required: true
          source: direct
          description: Spend category (material, subcontractor, rent, vehicles, utilities, software, insurance, tools)
          computation_spec: null
      lifecycle:
        states:
          - paid
        state_field: status
      sources:
        - bill
      instance_count: 745
      simulation_mapping:
        maps_to: VendorContract
        mapping_notes: >-
          Partial match to Simulation VendorContract. Each bill represents a
          discrete vendor transaction rather than an ongoing contract. May
          require adaptation — bills are transactional, contracts are relational.
      evidence:
        - source: bill.csv
          location: "all 745 rows, vendor_id and project_id columns"
          observation: >-
            745 bills from 9 distinct vendors. 77.2% project-related, 22.8%
            overhead (null project_id and job_id). 8 spend categories. All
            paid. Date range 2024-01-01 to 2026-02-05.

    # ── BillLineItem ─────────────────────────────────────────────────────
    - name: BillLineItem
      description: >-
        Line-item detail on vendor bills. In current data there is a 1:1
