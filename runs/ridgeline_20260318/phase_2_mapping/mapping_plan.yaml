  # ════════════════════════════════════════════════════════════════════════
  # Statistical Computations
  # ════════════════════════════════════════════════════════════════════════
  statistical_computations:

    - name: project_gross_margin
      description: >-
        Gross margin percentage for a project, calculated as
        (contract_amount - total_costs) / contract_amount.
        Primary profitability metric for the BOH agent.
      target_entity_type: Project
      target_property: gross_margin
      inputs:
        - source: project
          field: contract_amount
          aggregation: null
          window: null
        - source: bill
          field: total
          aggregation: sum
          window: null
        - source: time_entry
          field: cost
          aggregation: sum
          window: null
      formula: "(contract_amount - (sum(bill.total where project_id matches) + sum(time_entry.cost where project_id matches))) / contract_amount"
      output_type: float
      notes: >-
        Per-project computation. Requires joining bill and time_entry to project
        via project_id FK. Overhead bills (null project_id) excluded. Returns
        decimal (e.g. 0.25 = 25% margin).

    - name: project_total_costs
      description: >-
        Total actual costs for a project, combining vendor bills and labor costs
        from time entries.
      target_entity_type: Project
      target_property: total_costs
      inputs:
        - source: bill
          field: total
          aggregation: sum
          window: null
        - source: time_entry
          field: cost
          aggregation: sum
          window: null
      formula: "sum(bill.total where project_id matches) + sum(time_entry.cost where project_id matches)"
      output_type: float
      notes: >-
        Per-project computation. Bill costs include materials and subcontractors.
        Time entry costs include burdened labor. Overhead bills excluded.

    - name: employee_utilization
      description: >-
        Employee utilization rate over a trailing 12-month period, calculated as
        actual hours worked divided by available hours.
      target_entity_type: Employee
      target_property: utilization_rate
      inputs:
        - source: time_entry
          field: hours_regular
          aggregation: sum
          window: trailing_12m
        - source: time_entry
          field: hours_overtime
          aggregation: sum
          window: trailing_12m
      formula: "(sum(hours_regular) + sum(hours_overtime)) / (available_working_days * 8)"
      output_type: float
      notes: >-
        Per-employee per-period computation. Available hours assumes 8 hours/day,
        ~260 working days/year. Owner (EMP-001) excluded as they do not log time.
        Trailing 12-month window per D_2002 decision.

    - name: customer_lifetime_value
      description: >-
        Total contract value across all projects for a given customer.
        Measures customer relationship value to Ridgeline.
      target_entity_type: Customer
      target_property: lifetime_value
      inputs:
        - source: project
          field: contract_amount
          aggregation: sum
          window: null
      formula: "sum(project.contract_amount where customer_id matches)"
      output_type: float
      notes: >-
        Per-customer lifetime computation. Includes all projects regardless of
        date. 13 customers, 51 projects. Repeat customers will have higher values.

    - name: vendor_spend
      description: >-
        Total spend with a vendor over a trailing 12-month period.
        Supports vendor relationship management and negotiation.
      target_entity_type: Vendor
      target_property: total_spend
      inputs:
        - source: bill
          field: total
          aggregation: sum
          window: trailing_12m
      formula: "sum(bill.total where vendor_id matches and received_date within trailing 12 months)"
      output_type: float
      notes: >-
        Per-vendor per-period computation. Trailing 12-month window per D_2002.
        Includes both project and overhead bills for each vendor.

    - name: project_cost_variance
      description: >-
        Cost variance percentage for a project, calculated as
        (actual_cost - estimated_cost) / estimated_cost.
        Positive values indicate overrun, negative indicate underrun.
      target_entity_type: Project
      target_property: cost_variance
      inputs:
        - source: bill
          field: total
          aggregation: sum
          window: null
        - source: time_entry
          field: cost
          aggregation: sum
          window: null
        - source: estimate
          field: cost_estimate
          aggregation: null
          window: null
      formula: "((sum(bill.total) + sum(time_entry.cost)) - estimate.cost_estimate) / estimate.cost_estimate"
      output_type: float
      notes: >-
        Per-project computation. Requires joining through project.estimate_id
        to get the original cost_estimate from the estimate. Actual cost is
        sum of bills + labor (same as project_total_costs). Returns decimal
        (e.g. 0.10 = 10% overrun).

