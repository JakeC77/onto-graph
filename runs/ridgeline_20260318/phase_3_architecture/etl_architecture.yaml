  # ============================================================================
  # Incremental Strategy
  # ============================================================================
  incremental_strategy:
    detection_method: full_scan
    timestamp_fields: null
    notes: >-
      Full scan with MERGE ensures idempotency. For production with live
      connectors, switch to timestamp-based incremental using updated_at
      fields from source systems. The generated CSV data has no updated_at
      or modified_at columns, so full scan is the only viable approach for MVP.

  # ============================================================================
  # Simulation Integration
  # ============================================================================
  simulation_integration:
    export_format: neo4j_direct
    sdg_csv_mapping:
      - simulation_csv: employees.csv
        neo4j_query: "MATCH (e:Employee) RETURN e.id AS id, e.name AS name, e.role AS role, e.trade AS trade, e.status AS status, e.hire_date AS hire_date"

      - simulation_csv: initiatives.csv
        neo4j_query: "MATCH (p:Project) RETURN p.project_id AS id, p.name AS name, p.archetype AS archetype, p.status AS status, p.start_date AS start_date, p.end_date AS end_date"

      - simulation_csv: customers.csv
        neo4j_query: "MATCH (c:Customer) RETURN c.id AS id, c.name AS name, c.type AS type, c.email AS email, c.status AS status"

    constraint_profile_queries:
      - profile_field: headcount
        neo4j_query: "MATCH (e:Employee) WHERE e.status = 'active' RETURN count(e) AS headcount"

      - profile_field: active_projects
        neo4j_query: "MATCH (p:Project) WHERE p.status IN ['in_progress', 'active'] RETURN count(p) AS active_projects"

      - profile_field: total_contract_value
        neo4j_query: "MATCH (p:Project) RETURN sum(p.contract_amount) AS total_contract_value"

    notes: >-
      Simulation integration is limited. This dataset covers operational
      construction data (projects, estimates, bills, time tracking), not the
      organizational behavior data Simulation expects (departments, performance
      reviews, OKRs, engagement surveys). Most Simulation entity types
      (Department, Initiative, PerformanceReview, EngagementSurvey) have no
      source data in the Ridgeline dataset. Employee maps partially (no
      department assignment, no manager hierarchy). Project maps loosely to
      Initiative but lacks strategic context. See ontology
      simulation_compatibility section for the full gap analysis.
