        properties: [date]
        type: range
        cypher: "CREATE INDEX idx_narrativeevent_date IF NOT EXISTS FOR (n:NarrativeEvent) ON (n.date);"

  # ============================================================================
  # Pipeline DAG
  # ============================================================================
  pipeline_dag:
    stages:
      - name: ingest_master_data
        depends_on: []
        type: ingest
        sources:
          - company   # company.csv
          - customer   # customer.csv
          - vendor   # vendor.csv
          - employee   # employee.csv
        entity_types:
          - Company
          - Customer
          - Vendor
          - Employee
        estimated_rows: 29

      - name: ingest_estimates
        depends_on: [ingest_master_data]
        type: ingest
        sources:
          - estimate   # estimate.csv
          - estimate_line_item   # estimate_line_item.csv
        entity_types:
          - Estimate
          - EstimateLineItem
        estimated_rows: 1273

      - name: ingest_projects
        depends_on: [ingest_master_data, ingest_estimates]
        type: ingest
        sources:
          - project   # project.csv
          - job   # job.csv
        entity_types:
          - Project
          - Job
        estimated_rows: 330

      - name: ingest_financials
        depends_on: [ingest_projects]
        type: ingest
        sources:
          - bill   # bill.csv
          - bill_line_item   # bill_line_item.csv
          - invoice   # invoice.csv
          - payment   # payment.csv
        entity_types:
          - Bill
          - BillLineItem
          - Invoice
          - Payment
        estimated_rows: 1758

      - name: ingest_execution
        depends_on: [ingest_projects]
        type: ingest
        sources:
          - time_entry   # time_entry.csv
        entity_types:
          - TimeEntry
        estimated_rows: 1710

      - name: ingest_events
        depends_on: []
        type: ingest
        sources:
          - loc_event   # loc_event.csv
          - overtime_event   # overtime_event.csv
          - pricing_change   # pricing_change.csv
        entity_types:
          - NarrativeEvent
        estimated_rows: 3

      - name: load_relationships
        depends_on:
          - ingest_master_data
          - ingest_estimates
          - ingest_projects
          - ingest_financials
          - ingest_execution
          - ingest_events
        type: load
        sources: []
        entity_types: []
        estimated_rows: 5088

      - name: compute_stats
        depends_on:
          - ingest_master_data
          - ingest_estimates
          - ingest_projects
          - ingest_financials
          - ingest_execution
        type: transform
        sources: []
        entity_types:
          - Project
          - Employee
          - Customer
          - Vendor
        estimated_rows: 79

      - name: validate
        depends_on:
          - load_relationships
          - compute_stats
        type: validate
        sources: []
        entity_types: []
        estimated_rows: 0

  # ============================================================================
  # Pipeline Specs
  # ============================================================================
  pipeline_specs:

    # -- company.csv ---------------------------------------------------------
    - source_id: company
      reader:
        connection_type: file
        format: csv
        config:
          delimiter: ","
          sheet_name: null
          encoding: utf-8
          header_row: 0
          skip_rows: null
        system_id: null
        query: null
        incremental_field: null
        endpoint: null
        method: null
        pagination_type: null
        rate_limit_notes: null
      preprocessing:
        - step: type_coerce
          description: "No date or numeric fields require coercion for this source."
          config: null
      entity_extractions:
        - entity_type: Company
          filter: null
          id_expression: "row.name"
      relationship_extractions:
        - relationship_type: COMPANY_EMPLOYS
          from_expression: "row.name"
          to_expression: "row.owner_employee_id"
      upsert_strategy:
        mode: merge
        merge_keys: [name]
      error_handling:
        on_parse_error: quarantine
        on_constraint_violation: skip_row
        quarantine_path: runs/ridgeline_20260318/quarantine/

    # -- customer.csv --------------------------------------------------------
    - source_id: customer
      reader:
        connection_type: file
        format: csv
        config:
          delimiter: ","
          sheet_name: null
          encoding: utf-8
