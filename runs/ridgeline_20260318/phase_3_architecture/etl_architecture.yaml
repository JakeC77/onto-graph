      - label: Project
        properties: [archetype]
        type: btree
        cypher: "CREATE INDEX idx_project_archetype IF NOT EXISTS FOR (n:Project) ON (n.archetype);"

      - label: Project
        properties: [type]
        type: btree
        cypher: "CREATE INDEX idx_project_type IF NOT EXISTS FOR (n:Project) ON (n.type);"

      - label: Project
        properties: [status]
        type: btree
        cypher: "CREATE INDEX idx_project_status IF NOT EXISTS FOR (n:Project) ON (n.status);"

      - label: Project
        properties: [start_date]
        type: range
        cypher: "CREATE INDEX idx_project_start_date IF NOT EXISTS FOR (n:Project) ON (n.start_date);"

      - label: Project
        properties: [end_date]
        type: range
        cypher: "CREATE INDEX idx_project_end_date IF NOT EXISTS FOR (n:Project) ON (n.end_date);"

      - label: Project
        properties: [actual_start]
        type: range
        cypher: "CREATE INDEX idx_project_actual_start IF NOT EXISTS FOR (n:Project) ON (n.actual_start);"

      - label: Project
        properties: [actual_end]
        type: range
        cypher: "CREATE INDEX idx_project_actual_end IF NOT EXISTS FOR (n:Project) ON (n.actual_end);"

      - label: Project
        properties: [contract_type]
        type: btree
        cypher: "CREATE INDEX idx_project_contract_type IF NOT EXISTS FOR (n:Project) ON (n.contract_type);"

      - label: Job
        properties: [name]
        type: btree
        cypher: "CREATE INDEX idx_job_name IF NOT EXISTS FOR (n:Job) ON (n.name);"

      - label: Job
        properties: [status]
        type: btree
        cypher: "CREATE INDEX idx_job_status IF NOT EXISTS FOR (n:Job) ON (n.status);"

      - label: Job
        properties: [sub_vendor_type]
        type: btree
        cypher: "CREATE INDEX idx_job_sub_vendor_type IF NOT EXISTS FOR (n:Job) ON (n.sub_vendor_type);"

      - label: Job
        properties: [actual_start]
        type: range
        cypher: "CREATE INDEX idx_job_actual_start IF NOT EXISTS FOR (n:Job) ON (n.actual_start);"

      - label: Job
        properties: [actual_end]
        type: range
        cypher: "CREATE INDEX idx_job_actual_end IF NOT EXISTS FOR (n:Job) ON (n.actual_end);"

      - label: TimeEntry
        properties: [date]
        type: range
        cypher: "CREATE INDEX idx_timeentry_date IF NOT EXISTS FOR (n:TimeEntry) ON (n.date);"

      - label: Bill
        properties: [status]
        type: btree
        cypher: "CREATE INDEX idx_bill_status IF NOT EXISTS FOR (n:Bill) ON (n.status);"

      - label: Bill
        properties: [received_date]
        type: range
        cypher: "CREATE INDEX idx_bill_received_date IF NOT EXISTS FOR (n:Bill) ON (n.received_date);"

      - label: Bill
        properties: [due_date]
        type: range
        cypher: "CREATE INDEX idx_bill_due_date IF NOT EXISTS FOR (n:Bill) ON (n.due_date);"

      - label: Bill
        properties: [paid_date]
        type: range
        cypher: "CREATE INDEX idx_bill_paid_date IF NOT EXISTS FOR (n:Bill) ON (n.paid_date);"

      - label: Invoice
        properties: [type]
        type: btree
        cypher: "CREATE INDEX idx_invoice_type IF NOT EXISTS FOR (n:Invoice) ON (n.type);"

      - label: Invoice
        properties: [status]
        type: btree
        cypher: "CREATE INDEX idx_invoice_status IF NOT EXISTS FOR (n:Invoice) ON (n.status);"

