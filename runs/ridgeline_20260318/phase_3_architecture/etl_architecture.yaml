# ETL Architecture -- Phase 3 Output
# Ridgeline Builders engagement
# Generated: 2026-03-18

etl_architecture:
  metadata:
    company: Ridgeline Builders
    run_id: ridgeline_20260318
    created_at: "2026-03-18"
    mapping_plan_ref: runs/ridgeline_20260318/phase_2_mapping/mapping_plan.yaml
    system_manifest_ref: null
    neo4j_target_version: "5.x"

  # ============================================================================
  # Neo4j Schema
  # ============================================================================
  neo4j_schema:
    constraints:
      - type: uniqueness
        label: Company
        property: name
        cypher: "CREATE CONSTRAINT uniq_company_name IF NOT EXISTS FOR (n:Company) REQUIRE n.name IS UNIQUE;"

      - type: uniqueness
        label: Customer
        property: id
        cypher: "CREATE CONSTRAINT uniq_customer_id IF NOT EXISTS FOR (n:Customer) REQUIRE n.id IS UNIQUE;"

      - type: uniqueness
        label: Vendor
        property: id
        cypher: "CREATE CONSTRAINT uniq_vendor_id IF NOT EXISTS FOR (n:Vendor) REQUIRE n.id IS UNIQUE;"

      - type: uniqueness
        label: Employee
        property: id
        cypher: "CREATE CONSTRAINT uniq_employee_id IF NOT EXISTS FOR (n:Employee) REQUIRE n.id IS UNIQUE;"

      - type: uniqueness
        label: Estimate
        property: estimate_id
        cypher: "CREATE CONSTRAINT uniq_estimate_estimate_id IF NOT EXISTS FOR (n:Estimate) REQUIRE n.estimate_id IS UNIQUE;"

      - type: uniqueness
        label: EstimateLineItem
        property: line_id
        cypher: "CREATE CONSTRAINT uniq_estimatelineitem_line_id IF NOT EXISTS FOR (n:EstimateLineItem) REQUIRE n.line_id IS UNIQUE;"

      - type: uniqueness
        label: Project
        property: project_id
        cypher: "CREATE CONSTRAINT uniq_project_project_id IF NOT EXISTS FOR (n:Project) REQUIRE n.project_id IS UNIQUE;"

      - type: uniqueness
        label: Job
        property: job_id
        cypher: "CREATE CONSTRAINT uniq_job_job_id IF NOT EXISTS FOR (n:Job) REQUIRE n.job_id IS UNIQUE;"

      - type: uniqueness
        label: TimeEntry
        property: entry_id
        cypher: "CREATE CONSTRAINT uniq_timeentry_entry_id IF NOT EXISTS FOR (n:TimeEntry) REQUIRE n.entry_id IS UNIQUE;"

      - type: uniqueness
        label: Bill
        property: bill_id
        cypher: "CREATE CONSTRAINT uniq_bill_bill_id IF NOT EXISTS FOR (n:Bill) REQUIRE n.bill_id IS UNIQUE;"

      - type: uniqueness
        label: BillLineItem
        property: line_id
        cypher: "CREATE CONSTRAINT uniq_billlineitem_line_id IF NOT EXISTS FOR (n:BillLineItem) REQUIRE n.line_id IS UNIQUE;"

      - type: uniqueness
        label: Invoice
        property: invoice_id
        cypher: "CREATE CONSTRAINT uniq_invoice_invoice_id IF NOT EXISTS FOR (n:Invoice) REQUIRE n.invoice_id IS UNIQUE;"

      - type: uniqueness
        label: Payment
        property: payment_id
        cypher: "CREATE CONSTRAINT uniq_payment_payment_id IF NOT EXISTS FOR (n:Payment) REQUIRE n.payment_id IS UNIQUE;"

      - type: uniqueness
        label: NarrativeEvent
        property: event_id
        cypher: "CREATE CONSTRAINT uniq_narrativeevent_event_id IF NOT EXISTS FOR (n:NarrativeEvent) REQUIRE n.event_id IS UNIQUE;"

    indexes:
      - label: Company
        properties: [owner_name]
        type: btree
        cypher: "CREATE INDEX idx_company_owner_name IF NOT EXISTS FOR (n:Company) ON (n.owner_name);"

      - label: Customer
        properties: [name]
        type: btree
        cypher: "CREATE INDEX idx_customer_name IF NOT EXISTS FOR (n:Customer) ON (n.name);"

      - label: Customer
        properties: [type]
        type: btree
        cypher: "CREATE INDEX idx_customer_type IF NOT EXISTS FOR (n:Customer) ON (n.type);"

      - label: Customer
        properties: [status]
        type: btree
        cypher: "CREATE INDEX idx_customer_status IF NOT EXISTS FOR (n:Customer) ON (n.status);"

      - label: Customer
        properties: [created_at]
        type: range
        cypher: "CREATE INDEX idx_customer_created_at IF NOT EXISTS FOR (n:Customer) ON (n.created_at);"

      - label: Vendor
