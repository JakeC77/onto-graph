          skip_rows: null
        system_id: null
        query: null
        incremental_field: null
        endpoint: null
        method: null
        pagination_type: null
        rate_limit_notes: null
      preprocessing:
        - step: type_coerce
          description: "Cast created_at to ISO-8601 date. Cast credit_limit to float. Cast tax_exempt to boolean."
          config:
            fields:
              - name: created_at
                target_type: date
              - name: credit_limit
                target_type: float
              - name: tax_exempt
                target_type: boolean
        - step: normalize
          description: "Normalize status enum to lowercase (active, inactive)."
          config:
            fields:
              - name: status
                method: lowercase
      entity_extractions:
        - entity_type: Customer
          filter: null
          id_expression: "row.id"
      relationship_extractions: []
      upsert_strategy:
        mode: merge
        merge_keys: [id]
      error_handling:
