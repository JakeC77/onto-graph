        type: btree
        cypher: "CREATE INDEX idx_estimate_status IF NOT EXISTS FOR (n:Estimate) ON (n.status);"

      - label: Estimate
        properties: [created_at]
        type: range
        cypher: "CREATE INDEX idx_estimate_created_at IF NOT EXISTS FOR (n:Estimate) ON (n.created_at);"

      - label: Estimate
        properties: [sent_at]
        type: range
        cypher: "CREATE INDEX idx_estimate_sent_at IF NOT EXISTS FOR (n:Estimate) ON (n.sent_at);"

      - label: Estimate
