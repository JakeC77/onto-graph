# ETL Architecture Schema — Phase 3 Output Contract
# Pipeline design for Neo4j graph population.

etl_architecture:
  metadata:
    company: string
    run_id: string
    created_at: ISO-8601
    mapping_plan_ref: string             # Path to mapping_plan.yaml
    system_manifest_ref: string | null   # Path to system_manifest.yaml (Track A / hybrid)
    neo4j_target_version: string         # e.g., "5.x"

  neo4j_schema:
    constraints:
      - type: string                     # uniqueness, existence, node_key
        label: string                    # Node label or relationship type
        property: string
        cypher: string                   # Generated Cypher statement
    indexes:
      - label: string
        properties: list[string]
        type: string                     # btree, fulltext, range, point
        cypher: string

  pipeline_dag:
    stages:
      - name: string                     # Stage identifier
        depends_on: list[string]         # Other stage names
        type: string                     # ingest, transform, load, validate
        sources: list[string]            # source_ids consumed
        entity_types: list[string]       # Entity types produced
        estimated_rows: integer

  pipeline_specs:
    - source_id: string                  # For files: source_id from data_catalog
                                         # For systems: "{system_id}.{table_or_endpoint}"
      reader:
        connection_type: string          # file, database_query, api_call
        # --- file reader fields (connection_type: file) ---
        format: string | null            # csv, xlsx, json, pdf, etc.
        config:
          delimiter: string | null       # For CSV
          sheet_name: string | null      # For Excel
          encoding: string | null        # utf-8, latin-1, etc.
          header_row: integer | null     # 0-indexed
          skip_rows: integer | null      # Rows to skip after header
        # --- database reader fields (connection_type: database_query) ---
        system_id: string | null         # system_id from system_manifest
        query: string | null             # SQL SELECT statement
        incremental_field: string | null # Column used for timestamp-based incremental
        # --- api reader fields (connection_type: api_call) ---
        endpoint: string | null          # REST path, e.g., /rest/v1.0/projects
        method: string | null            # GET, POST
        pagination_type: string | null   # offset, cursor, page
        rate_limit_notes: string | null
      preprocessing:
        - step: string                   # dedup, null_fill, type_coerce, normalize, filter
          description: string
          config: object | null          # Step-specific configuration
      entity_extractions:
        - entity_type: string
          filter: string | null          # Row filter condition (e.g., "status != 'deleted'")
          id_expression: string          # How to compute the node ID from source fields
      relationship_extractions:
        - relationship_type: string
          from_expression: string        # How to resolve the from-entity ID
          to_expression: string          # How to resolve the to-entity ID
      upsert_strategy:
        mode: string                     # merge, create_or_skip, replace
        merge_keys: list[string]         # Properties used for MERGE matching
      error_handling:
        on_parse_error: string           # skip_row, fail, quarantine
        on_constraint_violation: string  # skip_row, fail, quarantine
        quarantine_path: string | null   # Where bad rows go

  incremental_strategy:
    detection_method: string             # timestamp, hash, full_scan
    timestamp_fields: list[string] | null
    notes: string

  simulation_integration:
    export_format: string                # sdg_compatible_csv, neo4j_direct, api
    sdg_csv_mapping:
      - simulation_csv: string           # e.g., employees.csv
        neo4j_query: string              # Cypher that produces the CSV rows
    constraint_profile_queries:
      - profile_field: string            # Field in Simulation's constraint profile
        neo4j_query: string              # Cypher that computes the value
    notes: string

# ---
# Usage notes:
#
# The ETL architecture is the "how to get it there" specification.
# It consumes the mapping plan (Phase 2) and produces an executable
# blueprint. Phase 2 says "Person.name comes from employees.csv column
# 'full_name'". Phase 3 says "read employees.csv with UTF-8 encoding,
# skip header row 0, MERGE on employee_id, SET name = row.full_name".
#
# The neo4j_schema section is generated by tools/neo4j_schema_gen.py
# from the ontology. Pipeline specs are per-source and include
# everything needed to write the actual ETL code.
#
# simulation_integration specifies how Basin/Simulation reads from
# the Neo4j graph — either via exported CSVs matching SDG format or
# via direct Neo4j queries.
